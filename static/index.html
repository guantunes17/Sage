<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage — AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f7f7f8;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 14px 24px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #111;
    }

    header span {
      font-size: 0.8rem;
      color: #888;
      font-weight: 400;
    }

    /* ── Chat container ── */
    #chat-container {
      width: 100%;
      max-width: 720px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* ── Message rows ── */
    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .message-row.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.sage {
      align-self: flex-start;
      align-items: flex-start;
    }

    /* ── Bubbles ── */
    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: #4f6ef7;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.sage .bubble {
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      min-width: 40px;
    }

    /* ── Tool badge ── */
    .tool-badge {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
      margin-top: 5px;
      display: inline-block;
    }

    .badge-direct     { background: #f0f0f0; color: #666; }
    .badge-calculator { background: #fff3e0; color: #b45309; }
    .badge-web_search { background: #e8f5e9; color: #2e7d32; }
    .badge-error      { background: #fdecea; color: #c0392b; }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    /* ── Input area ── */
    #input-area {
      width: 100%;
      max-width: 720px;
      padding: 12px 16px 20px;
      background: #f7f7f8;
    }

    #input-form {
      display: flex;
      gap: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: border-color .15s;
    }

    #input-form:focus-within {
      border-color: #4f6ef7;
    }

    #message-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.92rem;
      resize: none;
      background: transparent;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
    }

    #send-btn {
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: #3a57e8; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { pointer-events: none; }

    /* ── Math & formatting ── */
    .katex { font-size: 1.05em; }

    .sage-message code {
      background: rgba(0,0,0,.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .sage-message strong { font-weight: 600; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .message-row { max-width: 92%; }
      #chat-container { padding: 16px 10px 10px; }
      #input-area { padding: 8px 10px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Sage</h1>
  <span>AI Assistant with Tool Calling</span>
</header>

<div id="chat-container"></div>

<div id="input-area">
  <form id="input-form">
    <textarea
      id="message-input"
      placeholder="Ask me anything…"
      rows="1"
      autocomplete="off"
    ></textarea>
    <button id="send-btn" type="submit" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="currentColor"/>
      </svg>
    </button>
  </form>
</div>

<script>
  const chat     = document.getElementById('chat-container');
  const form     = document.getElementById('input-form');
  const input    = document.getElementById('message-input');
  const sendBtn  = document.getElementById('send-btn');

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Submit on Enter (Shift+Enter = newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  function isAtBottom() {
    return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 60;
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function addUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'message-row user';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollToBottom();
    return row;
  }

  function addSageMessage() {
    const row = document.createElement('div');
    row.className = 'message-row sage';

    const bubble = document.createElement('div');
    bubble.className = 'bubble sage-message';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(typing);

    row.appendChild(bubble);
    chat.appendChild(row);
    scrollToBottom();
    return { row, bubble, typing };
  }

  function applyBadge(row, toolUsed) {
    const badge = document.createElement('span');
    badge.className = 'tool-badge';

    if (toolUsed === 'calculator') {
      badge.classList.add('badge-calculator');
      badge.textContent = '🧮 Calculator';
    } else if (toolUsed === 'web_search') {
      badge.classList.add('badge-web_search');
      badge.textContent = '🔍 Web Search';
    } else {
      badge.classList.add('badge-direct');
      badge.textContent = '💬 Direct Response';
    }

    row.appendChild(badge);
  }

  function formatMessage(text) {
    // Escape HTML before applying any transformations to prevent XSS
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function renderMath(element) {
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(element, {
        delimiters: [
          { left: '$$',  right: '$$',  display: true  },
          { left: '\\[', right: '\\]', display: true  },
          { left: '\\(', right: '\\)', display: false },
          { left: '$',   right: '$',   display: false },
        ],
        throwOnError: false,
      });
    }
  }

  function setStreaming(active) {
    sendBtn.disabled = active;
    input.disabled   = active;
    if (!active) {
      input.focus();
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    setStreaming(true);

    addUserMessage(text);
    const { row, bubble, typing } = addSageMessage();

    let firstToken = true;
    let rawText   = '';
    let textNode  = null;

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // Process complete SSE messages (separated by \n\n)
        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // keep incomplete tail

        for (const part of parts) {
          if (!part.trim()) continue;

          let eventType = null;
          let dataLine  = null;

          for (const line of part.split('\n')) {
            if (line.startsWith('event:')) {
              eventType = line.slice(6).trim();
            } else if (line.startsWith('data:')) {
              dataLine = line.slice(5).trim();
            }
          }

          if (!eventType || !dataLine) continue;

          let payload;
          try { payload = JSON.parse(dataLine); } catch { continue; }

          if (eventType === 'token' && payload.content) {
            if (firstToken) {
              typing.remove();
              textNode = document.createTextNode('');
              bubble.appendChild(textNode);
              firstToken = false;
            }
            rawText += payload.content;
            textNode.textContent += payload.content;
            if (isAtBottom()) scrollToBottom();

          } else if (eventType === 'done') {
            if (firstToken) {
              typing.remove();
              firstToken = false;
            }
            // Replace raw text with formatted HTML, then render math
            if (rawText) {
              bubble.innerHTML = formatMessage(rawText);
              renderMath(bubble);
            }
            applyBadge(row, payload.tool_used ?? null);
            scrollToBottom();

          } else if (eventType === 'error') {
            typing.remove();
            bubble.textContent = payload.content ?? 'Something went wrong.';
            const badge = document.createElement('span');
            badge.className = 'tool-badge badge-error';
            badge.textContent = '⚠ Error';
            row.appendChild(badge);
            scrollToBottom();
          }
        }
      }
    } catch (err) {
      typing.remove();
      bubble.textContent = 'Could not reach the server. Is it running?';
      const badge = document.createElement('span');
      badge.className = 'tool-badge badge-error';
      badge.textContent = '⚠ Network Error';
      row.appendChild(badge);
      scrollToBottom();
    } finally {
      setStreaming(false);
    }
  });
</script>

</body>
</html>
